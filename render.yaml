# Render Blueprint — ATX-HUB GBrain centralization rollout
#
# Provisions:
#   gbrain-web    — HTTP MCP server (stateless, Standard 2GB)
#   gbrain-worker — minion supervisor + sync/embed/dream cycle (Pro 4GB, 50GB disk)
#
# Cron Job is added in Phase 5 (after first sync) — see plan file at
# ~/.claude/plans/starry-growing-matsumoto.md.
#
# To apply: push this file to ATX-HUB, then in Render dashboard:
#   New → Blueprint → connect ActVox/gbrain → branch ATX-HUB → Apply
# Render reads this file and creates both services + the disk + the env
# var group in one shot.
#
# Env vars marked `sync: false` are NOT committed; Render prompts you for
# values during the Blueprint apply. Set DATABASE_URL to the Supabase
# transaction-mode pooler URL (ends in -pooler.supabase.co), NOT session.
#
# OV-14 fix: GBRAIN_ADMIN_BOOTSTRAP_TOKEN is generated by Render and
# never written to logs — the bootstrap token printout in serve-http.ts
# is suppressed when the env var is set.

# Shared env-var group so both services see the same secrets.
envVarGroups:
  - name: gbrain-shared
    envVars:
      - key: DATABASE_URL
        sync: false                          # Supabase transaction-pooler URL
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GBRAIN_STORAGE_S3_BUCKET
        sync: false                          # Cloudflare R2 bucket name
      - key: GBRAIN_STORAGE_S3_ENDPOINT
        sync: false                          # https://<account-id>.r2.cloudflarestorage.com
      - key: GBRAIN_STORAGE_S3_ACCESS_KEY
        sync: false
      - key: GBRAIN_STORAGE_S3_SECRET_KEY
        sync: false

services:
  # ─────────────────────────────────────────────────────────────────────
  # Web Service — HTTP MCP, /admin, /webhooks/github, /token
  # NO persistent disk. Stateless. Survives worker deploys.
  # ─────────────────────────────────────────────────────────────────────
  - type: web
    name: gbrain-web
    runtime: node                            # Bun installed in build phase
    plan: standard                           # 2GB / 1 CPU
    region: oregon                           # CHANGE if Supabase is elsewhere
    repo: https://github.com/ActVox/gbrain
    branch: ATX-HUB                          # rollout branch; switch to master after merge
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: |
      set -e
      curl -fsSL https://bun.sh/install | bash
      export PATH="$HOME/.bun/bin:$PATH"
      bun install --frozen-lockfile
      (cd admin && bun install --frozen-lockfile)
      bun run build:admin
      bun run build
    startCommand: ./bin/gbrain serve --http --port $PORT --public-url $GBRAIN_PUBLIC_URL --token-ttl 2592000
    envVars:
      - fromGroup: gbrain-shared
      - key: GBRAIN_PUBLIC_URL
        value: https://gbrain.actvox.dev      # CHANGE to your custom domain
      - key: GBRAIN_ADMIN_BOOTSTRAP_TOKEN
        generateValue: true                  # Render generates; never logged (OV-14)
      - key: GBRAIN_AUDIT_DIR
        value: /tmp/gbrain-audit             # ephemeral; web has no disk

  # ─────────────────────────────────────────────────────────────────────
  # Background Worker — minion supervisor (sync, embed, dream cycle)
  # OWNS the persistent disk. Only service that touches /var/gbrain/repos.
  # ─────────────────────────────────────────────────────────────────────
  - type: worker
    name: gbrain-worker
    runtime: node
    plan: pro                                # 4GB / 2 CPU — bulk-import RAM peaks
    region: oregon                           # MUST match web service region
    repo: https://github.com/ActVox/gbrain
    branch: ATX-HUB
    autoDeploy: true
    buildCommand: |
      set -e
      curl -fsSL https://bun.sh/install | bash
      export PATH="$HOME/.bun/bin:$PATH"
      bun install --frozen-lockfile
      bun run build
    # Idempotent startup: clones the team repos to the persistent disk on first boot,
    # then exec's the supervisor. Re-deploys skip clone if .git already exists.
    # GIT_PAT must be set as an env var (see envVars below) — fine-grained PAT with
    # contents-read on the team's repos.
    startCommand: |
      set -e
      cd /var/gbrain
      mkdir -p repos audit
      cd repos
      declare -A PAIRS=(
        ["basaev-app"]="app.basaev-web"
        ["bsv-spec"]="bsv-spec"
        ["basaev-com"]="basaev.com"
        ["research-actvox"]="research-actvox"
        ["mandala-estate"]="mandala-estate"
        ["ask-stars"]="ask-stars"
        ["ai-rozum"]="ai-rozum"
      )
      for ID in "${!PAIRS[@]}"; do
        REPO="${PAIRS[$ID]}"
        if [ ! -d "$ID/.git" ]; then
          echo "[startup] cloning ActVox/$REPO into $ID"
          rm -rf "$ID"
          git clone --depth 1 "https://x-access-token:$GIT_PAT@github.com/ActVox/$REPO.git" "$ID" || echo "[startup] WARN: clone $REPO failed"
        fi
      done
      cd /opt/render/project/src
      exec ./bin/gbrain jobs supervisor --concurrency 4
    disk:
      name: gbrain-data
      mountPath: /var/gbrain
      sizeGB: 50                             # 6 full-clone repos + audit + room to grow
    envVars:
      - fromGroup: gbrain-shared
      - key: GBRAIN_AUDIT_DIR
        value: /var/gbrain/audit             # persistent on the disk
      - key: GIT_PAT
        sync: false                          # Fine-grained GitHub PAT (contents:read on the 7 team repos)
      # Worker does not need GBRAIN_PUBLIC_URL or GBRAIN_ADMIN_BOOTSTRAP_TOKEN.

  # ─────────────────────────────────────────────────────────────────────
  # Cron Jobs — autopilot polling fallback + nightly maintenance
  # No disk. Submit minion jobs to the queue; main worker processes them.
  # ─────────────────────────────────────────────────────────────────────
  - type: cron
    name: gbrain-cron-sync
    runtime: node
    plan: starter                            # tiny — runs for ~5 sec per invocation
    region: oregon
    repo: https://github.com/ActVox/gbrain
    branch: ATX-HUB
    schedule: "*/30 * * * *"                 # every 30 min — fallback for missed webhooks
    buildCommand: |
      set -e
      curl -fsSL https://bun.sh/install | bash
      export PATH="$HOME/.bun/bin:$PATH"
      bun install --frozen-lockfile
      bun run build
    startCommand: |
      for SRC in basaev-app bsv-spec basaev-com research-actvox mandala-estate ask-stars ai-rozum; do
        echo "submit sync $SRC"
        ./bin/gbrain jobs submit sync --params "{\"sourceId\":\"$SRC\"}" --idempotency-key "cron:sync:$SRC:$(date -u +%Y-%m-%dT%H:%M)" 2>&1 | head -2
      done
      echo "submit embed --stale"
      ./bin/gbrain jobs submit embed --idempotency-key "cron:embed:$(date -u +%Y-%m-%dT%H)" 2>&1 | head -2
    envVars:
      - fromGroup: gbrain-shared              # only needs DATABASE_URL really

  - type: cron
    name: gbrain-cron-dream
    runtime: node
    plan: starter
    region: oregon
    repo: https://github.com/ActVox/gbrain
    branch: ATX-HUB
    schedule: "0 2 * * *"                    # 02:00 UTC daily
    buildCommand: |
      set -e
      curl -fsSL https://bun.sh/install | bash
      export PATH="$HOME/.bun/bin:$PATH"
      bun install --frozen-lockfile
      bun run build
    startCommand: |
      echo "submit autopilot-cycle (nightly)"
      ./bin/gbrain jobs submit autopilot-cycle --idempotency-key "cron:autopilot:$(date -u +%Y-%m-%d)" 2>&1 | head -3
    envVars:
      - fromGroup: gbrain-shared
